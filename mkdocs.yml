site_name: "🤠 cowboy"
site_description: Install, generate, and update AI coding agent skills.
repo_url: https://github.com/oneprompteu/cowboy
docs_dir: docs
site_dir: site
theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: amber
  features:
    - navigation.tabs
    - navigation.top
nav:
  - Overview: index.md
  - Commands: commands.md
  - Generation: generation.md
  - Architecture: architecture.md
  - Maintainers: maintainers.md
markdown_extensions:
  - tables
  - fenced_code
extra_css:
  - stylesheets/extra.css
